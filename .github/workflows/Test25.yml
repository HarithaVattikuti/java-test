name: Test latest 25

on:
  workflow_dispatch:


jobs:
  test-jdk-25:
    name: Test 25 - ${{ matrix.os }} - ${{ matrix.architecture }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest,macos-15-intel, macos-latest,ubuntu-22.04-arm, windows-11-arm]
        architecture: [x64, aarch64]        
        exclude:
          # Exclude x64 from macos-latest (M1 runners)
          - os: macos-latest
            architecture: x64
          # Exclude aarch64 from macos-13 (Intel runners)
          - os: macos-15-intel
            architecture: aarch64
          # Ubuntu and Windows runners don't support aarch64 architecture natively
          - os: ubuntu-latest
            architecture: aarch64
          - os: windows-latest
            architecture: aarch64
          - os: ubuntu-22.04-arm
            architecture: x64
          - os: windows-11-arm
            architecture: x64
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Setup Microsoft JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          architecture: ${{ matrix.architecture }}
      
      - name: Verify Java version
        run: java -version
