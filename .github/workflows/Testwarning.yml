name: Validate Java Warning

on:
  push:
  workflow_dispatch:
  
jobs:
  setup-java-on-main:
    name: ${{ matrix.distribution }} ${{ matrix.version }} (jdk-x64) - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest,windows-11-arm]
        distribution: [
            'temurin',
            'adopt',
            'adopt-openj9',
            'zulu',
            'liberica',
            'microsoft',
            'semeru',
            'corretto',
            'dragonwell',
            'sapmachine',
            'jetbrains'
          ] # internally 'adopt-hotspot' is the same as 'adopt'
        version: ['21'] #, '11', '17']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: setup-java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.version }}
          distribution: ${{ matrix.distribution }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  setup-java-on-testbranch:
    name: Test ${{ matrix.distribution }} ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest,windows-11-arm]
        distribution: [
            'temurin',
            'adopt',
            'adopt-openj9',
            'zulu',
            'liberica',
            'microsoft',
            'semeru',
            'corretto',
            'dragonwell',
            'sapmachine',
            'jetbrains'
          ] # internally 'adopt-hotspot' is the same as 'adopt'
        version: ['21'] #, '11', '17']
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: setup-java
        uses: chiranjib-swain/setup-java@improve-java-error-messaging
        with:
          java-version: ${{ matrix.version }}
          distribution: ${{ matrix.distribution }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
